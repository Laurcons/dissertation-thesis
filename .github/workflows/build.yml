name: Build thesis

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: make full

      - uses: actions/upload-artifact@v4
        with:
          name: thesis
          path: out/main.pdf

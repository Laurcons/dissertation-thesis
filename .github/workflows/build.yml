name: Build thesis

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: texlive/texlive:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build PDF
        run: make full

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: out/main.pdf
          make_latest: true
